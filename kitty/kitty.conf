font_family      Intel One Mono Medium
bold_font        Intel One Mono Bold
italic_font      Intel One Mono Medium Italic
bold_italic_font Intel One Mono Bold Italic
font_size 13.0
modify_font cell_width 105%

enable_audio_bell yes
visual_bell_duration 0.0
cursor_shape beam
cursor_blink_interval 0

scrollback_lines 20000
wheel_scroll_multiplier 5.0

enabled_layouts tall,stack
draw_minimal_borders yes
active_border_color #f0c674
inactive_border_color #3a414b

tab_bar_edge top
tab_bar_style powerline

background_opacity 1.0
window_padding_width 10

foreground #b0ada8
background #1a1e22
selection_foreground #1a1e22
selection_background #f0c674

color0  #1c1f24
color1  #ff7a90
color2  #7bc99c
color3  #f2cc8f
color4  #7fb4ff
color5  #cba6f7
color6  #76d0d8
color7  #c5c3bb
color8  #5c6370
color9  #ff8fa3
color10 #8bd5a7
color11 #f4d39b
color12 #92c1ff
color13 #d7b8ff
color14 #8be0e8
color15 #dcdad4

active_tab_foreground   #1a1e22
active_tab_background   #f0c674
inactive_tab_foreground #b0ada8
inactive_tab_background #2c3139

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+d launch --location=neighbor --cwd=current
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+n new_os_window_with_cwd
map ctrl+shift+w close_window
map ctrl+shift+] next_tab
map ctrl+shift+[ previous_tab
map ctrl+shift+space next_layout
map ctrl+shift+alt+t goto_layout tall
map ctrl+shift+alt+s goto_layout stack
map ctrl+shift+alt+p last_used_layout
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window bottom
map ctrl+shift+k neighboring_window top
map ctrl+shift+l neighboring_window right
map ctrl+shift+alt+h move_window left
map ctrl+shift+alt+j move_window bottom
map ctrl+shift+alt+k move_window top
map ctrl+shift+alt+l move_window right
map ctrl+shift+r start_resizing_window
map ctrl+shift+f launch --stdin-source=@screen_scrollback --stdin-add-formatting --type=overlay less +G -R
map ctrl+shift+e kitten hints
